# Google Cloud Build config
# Builds the Docker image and deploys to Cloud Run
#
# Usage:
#   gcloud builds submit --config deploy/cloudbuild.yaml .

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cbb-images/video-annotator:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cbb-images/video-annotator:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'video-annotator'
      - '--image=gcr.io/$PROJECT_ID/cbb-images/video-annotator:latest'
      - '--region=us-west1'
      - '--platform=managed'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-env-vars=SESSION_SECRET=cbb-annotator-prod-v1-x9k2m4p7w3'

images:
  - 'gcr.io/$PROJECT_ID/cbb-images/video-annotator:latest'
